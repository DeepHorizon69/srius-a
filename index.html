<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portofolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="theme-aero-atom">
    <div id="root"></div>

    <!-- Config data yang mudah diubah -->
    <script src="profile-config.js"></script>

    <!-- React & Babel via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { PROFILE, missions, skills, timelines, socialLinks } = window.PORTFOLIO_CONFIG;

        const Badge = ({ icon, label }) => (
            <div className="badge">
                <i className={icon}></i>
                <span>{label}</span>
            </div>
        );

        const App = () => {
            return (
                <div className="app">
                    <header className="nav">
                        <div className="container nav-inner">
                            <a href="index.html" className="nav-brand">
                                <span className="brand-mark">
                                    <img src={PROFILE.avatarBrand} alt="Logo" className="brand-logo" />
                                </span>
                                <div className="brand-text">
                                    <span>{PROFILE.fullName}</span>
                                    <small>Technology & Science Enthusiast</small>
                                </div>
                            </a>
                            <nav className="nav-links">
                                <a href="index.html" className="nav-link nav-link--active">Profil</a>
                                <a href="page2.html" className="nav-link">Misi & Keahlian</a>
                                <a href="page3.html" className="nav-link">Kontak</a>
                            </nav>
                            <a href="page3.html" className="nav-cta">
                                <i className="fas fa-paper-plane"></i>
                                <span>Kontak</span>
                            </a>
                        </div>
                    </header>

                    <main>
                        <section id="hero" className="section hero">
                            <div className="container hero-grid">
                                <div className="hero-content">
                                    <div className="hero-badge-row">
                                        <Badge icon="fas fa-meteor" label="Portofolio • Tema Aerospace" />
                                        <Badge icon="fas fa-microchip" label="Siswa XI TJTK" />
                                    </div>
                                    <h1 className="hero-title">
                                        Halo, saya {PROFILE.shortName}
                                        <span className="gradient-text">{PROFILE.role}</span>
                                    </h1>
                                    <p className="hero-tagline">{PROFILE.tagline}</p>
                                    <div className="hero-meta">
                                        <div className="meta-item">
                                            <i className="fas fa-location-dot"></i>
                                            <span>{PROFILE.location}</span>
                                        </div>
                                        <div className="meta-item">
                                            <i className="fas fa-school"></i>
                                            <span>Siswa XI TJTK yang terus belajar dan bereksperimen.</span>
                                        </div>
                                        <div className="meta-item">
                                            <i className="fas fa-lightbulb"></i>
                                            <span>Minat: komputer, sains & fisika, teknologi, elektronika, IoT.</span>
                                        </div>
                                    </div>
                                    <div className="hero-actions">
                                        <a href="page2.html#missions" className="btn primary">
                                            <i className="fas fa-rocket"></i>
                                            <span>Lihat Misi Saya</span>
                                        </a>
                                        <a href="page3.html#contact" className="btn ghost">
                                            <i className="fas fa-envelope"></i>
                                            <span>Hubungi saya</span>
                                        </a>
                                    </div>
                                    <div className="hero-stats">
                                        <div className="stat-card">
                                            <span className="stat-number">3+</span>
                                            <span className="stat-label">Proyek Saya</span>
                                        </div>
                                        <div className="stat-card">
                                            <span className="stat-number">∞</span>
                                            <span className="stat-label">Rasa ingin tahu</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="hero-visual">
                                    <div className="space-orbit space-orbit-outer">
                                        <div className="space-orbit space-orbit-middle">
                                            <div className="space-orbit space-orbit-inner">
                                                <div className="planet">
                                                    <img src={PROFILE.avatar} alt="Foto Profil" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="satellite satellite-1">
                                            <i className="fas fa-satellite"></i>
                                        </div>
                                        <div className="satellite satellite-2">
                                            <i className="fas fa-shuttle-space"></i>
                                        </div>
                                    </div>
                                    <div className="hero-annotation">
                                        <span>-----</span> 
                                        <strong>Komputer • Fisika • Teknologi • IoT</strong>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="about" className="section">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">Tentang Saya</p>
                                    <h2 className="section-title">Perjalanan Hidup</h2>
                                    <p className="section-subtitle">
                                        Saya adalah siswa kelas XI TJTK yang tertarik pada komputer, sains/fisika, teknologi,
                                        aerospace, elektronika, dan IoT. Saya suka menghubungkan apa yang saya pelajari di kelas
                                        dengan dunia nyata.
                                    </p>
                                </div>
                                <div className="about-grid">
                                    <div className="about-card">
                                        <h3>Kenapa Teknologi?</h3>
                                        <p>
                                            Dunia teknologi menggabungkan fisika, matematika, teknologi, dan imajinasi. Bagi saya,
                                            setiap perangkat, aplikasi, dan sistem adalah bukti bagaimana sains bisa membawa manusia lebih jauh.
                                        </p>
                                        <p>
                                            Saya senang mempelajari konsep-konsep seperti algoritma, pemrograman, dan pengembangan aplikasi.
                                        </p>
                                    </div>
                                    <div className="about-card">
                                        <h3>Hal yang saya sukai</h3>
                                        <ul className="about-list">
                                            <li><i className="fas fa-check-circle"></i> Mencoba hal baru di dunia komputer, jaringan, dan pemrograman.</li>
                                            <li><i className="fas fa-check-circle"></i> Membaca tentang fisika, teknologi penerbangan, dan eksplorasi luar angkasa.</li>
                                            <li><i className="fas fa-check-circle"></i> Eksperimen dengan elektronika dan proyek kecil IoT.</li>
                                            <li><i className="fas fa-check-circle"></i> Mengambil gambar dengan kamera dan mengeditnya.</li>
                                            <li><i className="fas fa-check-circle"></i> Bermain game war thunder.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Page 1 hanya menampilkan perkenalan & tentang saya */}
                    </main>

                    <footer className="footer">
                        <div className="container footer-inner">
                            <p>&copy; 2025 {PROFILE.signName}.</p>
                            <span className="footer-note">
                                Terinspirasi oleh bintang-bintang, dibangun dengan kode.
                            </span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

    </script>
</body>
</html>
