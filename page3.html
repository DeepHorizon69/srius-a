<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Kontak & Lainnya (Page 3)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="theme-contact">
    <div id="root"></div>

    <script src="profile-config.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { PROFILE, socialLinks } = window.PORTFOLIO_CONFIG;

        const App = () => {
            return (
                <div className="app">
                    <header className="nav">
                        <div className="container nav-inner">
                            <a href="index.html" className="nav-brand">
                                <span className="brand-mark">
                                    <img src={PROFILE.avatarBrand} alt="Logo" className="brand-logo" />
                                </span>
                                <div className="brand-text">
                                    <span>{PROFILE.fullName}</span>
                                    <small>Contact & More</small>
                                </div>
                            </a>
                            <nav className="nav-links">
                                <a href="index.html" className="nav-link">Profil</a>
                                <a href="page2.html" className="nav-link">Misi & Keahlian</a>
                                <a href="page3.html" className="nav-link nav-link--active">Kontak</a>
                            </nav>
                            <a href="page3.html" className="nav-cta">
                                <i className="fas fa-paper-plane"></i>
                                <span>Kontak</span>
                            </a>
                        </div>
                    </header>

                    <main>
                        <section className="section hero">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">___</p>
                                    <h2 className="section-title">Kontak & Informasi Tambahan</h2>
                                    <p className="section-subtitle">
                                        Jika ingin berdiskusi, berkolaborasi, atau sekadar menyapa, silakan gunakan informasi kontak
                                        di bawah ini. Saya terbuka untuk obrolan seputar komputer, teknologi, fisika, dan aerospace.
                                    </p>
                                </div>
                            </div>
                        </section>

                        <section id="contact" className="section contact">
                            <div className="container">
                                <div className="contact-grid">
                                    <div className="contact-card">
                                        <h3>Kirim Email</h3>
                                        <p>Untuk pertanyaan, kerja sama tugas, atau diskusi santai.</p>
                                        <a href={`mailto:${PROFILE.email}`} className="contact-link">
                                            <i className="fas fa-envelope"></i>
                                            <span>{PROFILE.email}</span>
                                        </a>
                                    </div>
                                    <div className="contact-card">
                                        <h3>Media Sosial</h3>
                                        <p>Beberapa koordinat digital yang bisa digunakan untuk menghubungi saya.</p>
                                        <div className="social-row">
                                            {socialLinks.map((link, index) => (
                                                <a
                                                    key={index}
                                                    href={link.href}
                                                    target="_blank"
                                                    rel="noreferrer"
                                                    className="social-pill"
                                                >
                                                    <i className={`fab ${link.icon}`}></i>
                                                    <span>{link.label}</span>
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="section">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">Lain-lain</p>
                                    <h2 className="section-title">Catatan Tambahan</h2>
                                    <p className="section-subtitle">
                                        Di bagian ini Anda bisa menambahkan informasi lain seperti hobi, prestasi, atau link ke
                                        dokumen/portofolio lain. Silakan edit langsung di file HTML ini sesuai kebutuhan.
                                    </p>
                                </div>
                                <div className="about-grid">
                                    <div className="about-card">
                                        <h3>Hobi & Aktivitas</h3>
                                        <p>- Contoh: Ngoprek komputer dan jaringan.</p>
                                        <p>- Contoh: Membaca tentang fisika modern dan teknologi penerbangan.</p>
                                        <p>- Contoh: Mencoba proyek elektronik atau IoT sederhana.</p>
                                    </div>
                                    <div className="about-card">
                                        <h3>Link Tambahan</h3>
                                        <p>Anda bisa menaruh link ke:</p>
                                        <p>- Drive tugas sekolah.</p>
                                        <p>- Repositori GitHub pribadi.</p>
                                        <p>- Blog atau catatan belajar online.</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="footer">
                        <div className="container footer-inner">
                            <p>&copy; 2025 {PROFILE.fullName}. Portofolio bertema multi-page.</p>
                            <span className="footer-note">
                                Page 1: Aerospace & Fisika • Page 2: Teknologi & Sains • Page 3: Kontak
                            </span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

    </script>
</body>
</html>
