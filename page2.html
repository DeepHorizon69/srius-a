<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Misi & Keahlian (Page 2)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="theme-tech-science">
    <div id="root"></div>

    <script src="profile-config.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { PROFILE, missions, skills, timelines } = window.PORTFOLIO_CONFIG;

        const App = () => {
            return (
                <div className="app">
                    <header className="nav">
                        <div className="container nav-inner">
                            <a href="index.html" className="nav-brand">
                                <span className="brand-mark">
                                    <img src={PROFILE.avatarBrand} alt="Logo" className="brand-logo" />
                                </span>
                                <div className="brand-text">
                                    <span>{PROFILE.fullName}</span>
                                    <small>more about me</small>
                                </div>
                            </a>
                            <nav className="nav-links">
                                <a href="index.html" className="nav-link">Profil</a>
                                <a href="page2.html" className="nav-link nav-link--active">Misi & Keahlian</a>
                                <a href="page3.html" className="nav-link">Kontak</a>
                            </nav>
                            <a href="page3.html" className="nav-cta">
                                <i className="fas fa-paper-plane"></i>
                                <span>Kontak</span>
                            </a>
                        </div>
                    </header>

                    <main>
                        <section className="section">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">halaman ini berisi tentang hal yang sedang saya kerjakan</p>
                                    <h2 className="section-title">Misi Belajar & Proyek</h2>
                                    <p className="section-subtitle">
                                        Halaman ini berfokus pada misi, keahlian, dan perjalanan belajar saya
                                        dengan tema teknologi dan sains.
                                    </p>
                                </div>
                            </div>
                        </section>

                        <section id="missions" className="section section-alt">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">Proyek saya</p>
                                    <h2 className="section-title">hal yang sedang saya kerjakan</h2>
                                </div>
                                <div className="card-grid">
                                    {missions.map((mission, index) => (
                                        <article key={index} className="card">
                                            <div className="card-tag">
                                                <i className="fas fa-rocket"></i>
                                                <span>{mission.type}</span>
                                            </div>
                                            <h3 className="card-title">{mission.title}</h3>
                                            <p className="card-body">{mission.description}</p>
                                            <div className="card-footer">
                                                <span className="tech-label">Teknologi / Fokus:</span>
                                                <div className="chip-row">
                                                    {mission.tech.map((t, i) => (
                                                        <span key={i} className="chip">{t}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section className="section">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">Keahlian & Minat</p>
                                    <h2 className="section-title">ini minat saya</h2>
                                </div>
                                <div className="skills-grid">
                                    {skills.map((skill, index) => (
                                        <div key={index} className="skill-card">
                                            <div className="skill-icon">
                                                <i className={`fas ${skill.icon}`}></i>
                                            </div>
                                            <h3>{skill.title}</h3>
                                            <p>{skill.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section className="section section-alt">
                            <div className="container">
                                <div className="section-header">
                                    <p className="eyebrow">Perjalanan</p>
                                    <h2 className="section-title">Riwayat Pendidikan</h2>
                                </div>
                                <div className="timeline">
                                    {timelines.map((item, index) => (
                                        <div key={index} className="timeline-item">
                                            <div className="timeline-dot"></div>
                                            <div className="timeline-content">
                                                <span className="timeline-year">{item.year}</span>
                                                <h3>{item.title}</h3>
                                                <p>{item.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

    </script>
</body>
</html>
